config_version: 2

settings:
  triggers:
    crafting: true
    enchanting: true
    anvil: true
  pdc_key: "gacha_rolled"
  pdc_data_type: "BYTE"

  roll:
    min_attributes_per_item: 1
    max_attributes_per_item: 4
    allow_duplicate_attribute_ids: false
    duplicate_modifier_mode: "UNIQUE"
    max_roll_attempts_per_item: 20

  lore:
    append_mode: "APPEND"
    stat_line_prefix: ""
    show_rarity_prefix_once: true
    decimal_places: 1

  debug:
    enabled: false
    seed: -1
    log_invalid_entries: true

  commands:
    reload_permission: "mysticcombat.reload"
    admin_permission: "mysticcombat.admin"

rarities:
  Unchanged:
    weight: 100
    prefix: ""
    stats_amount:
      min: 0
      max: 0
  Common:
    weight: 50
    prefix: "      &f&l『Common』"
    stats_amount:
      min: 1
      max: 2
  Uncommon:
    weight: 25
    prefix: "    &a&l『Uncommon』"
    stats_amount:
      min: 1
      max: 2
  Rare:
    weight: 15
    prefix: "        &9&l『Rare』"
    stats_amount:
      min: 2
      max: 3
  Epic:
    weight: 8
    prefix: "        &5&l『Epic』"
    stats_amount:
      min: 2
      max: 4
  Legendary:
    weight: 2
    prefix: "    &6&l『Legendary』"
    stats_amount:
      min: 2
      max: 5

attributes_pool:
  flat_damage_buff:
